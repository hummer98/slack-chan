name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Skip npm publish and gh release create (build/compile only)'
        type: boolean
        default: true

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Determine release context
        id: ctx
        env:
          DRY_RUN_INPUT: ${{ inputs.dry_run }}
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            is_tag=true
            version="${GITHUB_REF_NAME#v}"
          else
            is_tag=false
            version=$(node -e "console.log(require('./package.json').version)")
          fi
          if [[ "${DRY_RUN_INPUT:-}" == "true" || "${is_tag}" != "true" ]]; then
            is_dry=true
          else
            is_dry=false
          fi
          {
            echo "is_tag=${is_tag}"
            echo "is_dry=${is_dry}"
            echo "version=${version}"
            echo "tag=v${version}"
          } >> "$GITHUB_OUTPUT"
          echo "release context: is_tag=${is_tag} is_dry=${is_dry} version=${version}"

      - name: typecheck / lint / test (safety net)
        run: |
          bun run typecheck
          bun run lint
          bun run test

      - name: Build npm bundle (dist/slack-chan.js)
        run: bun run build:js

      - name: Publish to npm (OIDC Trusted Publishing)
        env:
          IS_DRY: ${{ steps.ctx.outputs.is_dry }}
        run: |
          set -euo pipefail
          # setup-node が書き込む .npmrc の TOKEN プレースホルダーを削除し、
          # npm に OIDC を使わせる (cmux-team release.yml と同じ手順)。
          sed -i '/_authToken/d' "$NPM_CONFIG_USERCONFIG" 2>/dev/null || true
          if [[ "$IS_DRY" == "true" ]]; then
            echo "::notice::dry-run: npm publish --dry-run"
            npm publish --provenance --access public --dry-run
          else
            npm publish --provenance --access public
          fi

      - name: Build cross-compile binaries (bun --compile)
        env:
          VERSION: ${{ steps.ctx.outputs.version }}
        run: |
          set -euo pipefail
          mkdir -p dist
          for TARGET in bun-darwin-arm64 bun-darwin-x64 bun-linux-x64 bun-linux-arm64; do
            OUT="dist/slack-chan-${VERSION}-${TARGET}"
            echo "==> compile ${OUT}"
            bun build --compile --target="${TARGET}" ./src/cli/index.ts --outfile "${OUT}"
          done
          # shellcheck disable=SC2086 # glob expansion intended
          (cd dist && shasum -a 256 slack-chan-${VERSION}-* > SHA256SUMS)
          ls -la dist/

      - name: Extract changelog and create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          IS_DRY: ${{ steps.ctx.outputs.is_dry }}
          TAG: ${{ steps.ctx.outputs.tag }}
          VERSION: ${{ steps.ctx.outputs.version }}
        run: |
          set -euo pipefail
          NOTES=$(awk "/^## \[${VERSION}\]/{found=1; next} /^## \[/{if(found) exit} found" CHANGELOG.md)
          if [[ -z "$NOTES" ]]; then
            NOTES="(no changelog entry for ${TAG} — see commit history)"
          fi
          # shellcheck disable=SC2086 # glob expansion intended for release artifacts
          if [[ "$IS_DRY" == "true" ]]; then
            echo "::notice::dry-run: would create release ${TAG}"
            echo "----- release notes -----"
            echo "$NOTES"
            echo "-------------------------"
            ls -la dist/slack-chan-${VERSION}-* dist/SHA256SUMS
          else
            gh release create "${TAG}" \
              --title "${TAG}" \
              --notes "${NOTES}" \
              dist/slack-chan-${VERSION}-* dist/SHA256SUMS
          fi
